name: Data Engineering CI (PySpark)

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyspark flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Lint (flake8)
        run: |
          flake8 src \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
      - name: Lint (complexity & style)
        run: |
          flake8 src \
            --count \
            --exit-zero \
            --max-complexity=10 \
            --max-line-length=120 \
            --statistics
      - name: Run tests
        run: |
          if [ -d tests ]; then pytest; else echo "No tests directory found"; fi
